<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HTML Forms</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f5f7fa;
margin:0;
padding:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:white;
width:90%;
max-width:800px;
padding:25px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h1{
text-align:center;
margin-bottom:10px;
}

.code-box{
background:#1e1e1e;
color:#fff;
padding:15px;
border-radius:8px;
overflow:auto;
margin:15px 0;
}

.output-box{
border:2px solid #eee;
padding:15px;
border-radius:8px;
margin-top:10px;
}

input, select, textarea{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#45a049;
}

.buttons{
display:flex;
justify-content:space-between;
margin-top:20px;
}

@media(max-width:350px){

.container{
padding:15px;
}

button{
font-size:14px;
padding:8px 12px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>HTML Forms</h1>

<p>HTML forms are used to collect user input.</p>

<h3>Example Code</h3>

<div class="code-box">
&lt;form&gt;<br>
&lt;label&gt;Name&lt;/label&gt;<br>
&lt;input type="text"&gt;<br><br>

&lt;label&gt;Email&lt;/label&gt;<br>
&lt;input type="email"&gt;<br><br>

&lt;button&gt;Submit&lt;/button&gt;<br>
&lt;/form&gt;
</div>

<h3>Output</h3>

<div class="output-box">

<form>

<label>Name</label>
<input type="text" placeholder="Enter your name">

<label>Email</label>
<input type="email" placeholder="Enter your email">

<label>Message</label>
<textarea placeholder="Write message"></textarea>

<label>Choose Option</label>
<select>
<option>HTML</option>
<option>CSS</option>
<option>JavaScript</option>
</select>

<button type="submit">Submit</button>

</form>

</div>

<div class="buttons">

<button onclick="location.href='Buttons.html'">⬅ Previous</button>

<button onclick="location.href='Tables.html'">Next ➡</button>

</div>

</div>

</body>
</html>
