<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Responsive HTML</title>

<style>

body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 350px;
  margin: auto;
}

.title {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 10px;
}

.description {
  margin-bottom: 15px;
}

.code-box {
  background: #020617;
  padding: 15px;
  border-radius: 10px;
  font-family: monospace;
  overflow: auto;
  animation: fadeIn 0.6s ease;
}

.output-box {
  background: white;
  color: black;
  padding: 15px;
  border-radius: 10px;
  margin-top: 15px;
  min-height: 120px;
  animation: slideUp 0.6s ease;
}

.responsive-box {
  background: #3b82f6;
  color: white;
  padding: 20px;
  text-align: center;
  border-radius: 10px;
}

button {
  margin-top: 15px;
  padding: 10px;
  border: none;
  background: #3b82f6;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.navigation {
  display: flex;
  justify-content: space-between;
  margin-top: 25px;
}

.nav-btn {
  padding: 10px 20px;
  background: #1e293b;
  border-radius: 8px;
}

/* Responsive */

@media (max-width: 350px) {
  .responsive-box {
    background: #ef4444;
  }
}

/* Animations */

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

</style>

</head>

<body>

<div class="container">

<div class="title">Responsive HTML</div>

<div class="description">
Responsive HTML allows your website to adapt to mobile, tablet, and desktop screens.
</div>

<div class="code-box">
&lt;meta name="viewport" content="width=device-width, initial-scale=1.0"&gt;

&lt;style&gt;
@media (max-width: 350px) {
  body {
    background: red;
  }
}
&lt;/style&gt;
</div>

<button onclick="runCode()">Run Code</button>

<div class="output-box" id="output">
Output will appear here...
</div>

<div class="navigation">
<button class="nav-btn" onclick="prevPage()">Prev</button>
<button class="nav-btn" onclick="nextPage()">Next</button>
</div>

</div>

<script>

function runCode() {
const output = document.getElementById("output");

output.innerHTML = `
<div class="responsive-box">
Resize screen to see responsive effect 📱
</div>
`;

output.style.animation = "none";
output.offsetHeight;
output.style.animation = "slideUp 0.6s ease";
}

function prevPage() {
window.location.href = "Favicon.html";
}

function nextPage() {
window.location.href = "Accessibility.html";
}

</script>

</body>
  </html>
