<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HTML Favicon</title>

<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/732/732212.png">

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 350px;
  margin: auto;
}

.title {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 10px;
}

.description {
  margin-bottom: 15px;
}

.code-box {
  background: #020617;
  padding: 15px;
  border-radius: 10px;
  font-family: monospace;
  overflow: auto;
  animation: fadeIn 0.6s ease;
}

.output-box {
  background: white;
  color: black;
  padding: 15px;
  border-radius: 10px;
  margin-top: 15px;
  min-height: 120px;
  display: flex;
  justify-content: center;
  align-items: center;
  animation: slideUp 0.6s ease;
  flex-direction: column;
}

button {
  margin-top: 15px;
  padding: 10px;
  border: none;
  background: #3b82f6;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.navigation {
  display: flex;
  justify-content: space-between;
  margin-top: 25px;
}

.nav-btn {
  padding: 10px 20px;
  background: #1e293b;
  border-radius: 8px;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

</style>
</head>

<body>

<div class="container">

<div class="title">HTML Favicon</div>

<div class="description">
A favicon is the small icon that appears in the browser tab.
You add it using the link tag inside the head section.
</div>

<div class="code-box">
&lt;link rel="icon" type="image/png" href="favicon.png"&gt;
</div>

<button onclick="runCode()">Run Code</button>

<div class="output-box" id="output">
Explanation will appear here...
</div>

<div class="navigation">
<button class="nav-btn" onclick="prevPage()">Prev</button>
<button class="nav-btn" onclick="nextPage()">Next</button>
</div>

</div>

<script>

function runCode() {
const output = document.getElementById("output");

output.innerHTML = `
<p><b>rel="icon"</b> - Defines favicon</p>
<p><b>type</b> - Image format</p>
<p><b>href</b> - Icon path</p>
<p>Check browser tab to see favicon 👆</p>
`;

output.style.animation = "none";
output.offsetHeight;
output.style.animation = "slideUp 0.6s ease";
}

function prevPage() {
window.location.href = "MetaTags.html";
}

function nextPage() {
window.location.href = "ResponsiveHTML.html";
}

</script>

</body>
</html>
