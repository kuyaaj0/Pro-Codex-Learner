<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pro-Codex Learner Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body {
font-family: 'Inter', sans-serif;
background: #f5f7fa;
margin: 0;
padding: 0;
color: #333;
}

/* Header */

.header {
text-align: center;
padding: 40px 20px;
}

.header h1 {
margin: 0;
font-size: 32px;
font-weight: 600;
}

.header p {
margin-top: 10px;
color: #666;
}

/* Container */

.main-container {
display: flex;
justify-content: center;
align-items: center;
padding: 40px;
}

/* Carousel */

.carousel-container {
position: relative;
width: 900px;
overflow: hidden;
}

/* Cards */

.carousel {
display: flex;
transition: transform 0.5s ease;
}

.card {
min-width: 100%;
background: white;
border-radius: 12px;
box-shadow: 0 5px 20px rgba(0,0,0,0.05);
padding: 40px;
text-align: center;
}

.card img {
width: 120px;
height: 120px;
object-fit: contain;
margin-bottom: 20px;
}

.card h2 {
margin-bottom: 10px;
}

.card p {
color: #666;
margin-bottom: 20px;
}

/* Buttons */

.learn-btn {
padding: 12px 25px;
background: #4a7cff;
color: white;
border: none;
border-radius: 6px;
cursor: pointer;
font-weight: 500;
transition: 0.2s ease;
}

.learn-btn:hover {
background: #355edb;
}

/* Navigation Buttons */

.nav-btn {
position: absolute;
top: 50%;
transform: translateY(-50%);
background: white;
border: none;
padding: 12px 16px;
border-radius: 50%;
cursor: pointer;
box-shadow: 0 3px 10px rgba(0,0,0,0.1);
font-size: 18px;
}

.nav-btn:hover {
background: #f0f0f0;
}

.left {
left: -20px;
}

.right {
right: -20px;
}

</style>

</head>

<body>

<div class="header">
<h1>Pro-Codex Learner Platform</h1>
<p>Choose a Programming Language to Start Learning</p>
</div>

<div class="main-container">

<div class="carousel-container">

<button class="nav-btn left" onclick="prev()">‹</button>

<div class="carousel" id="carousel">

<!-- HTML -->

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/732/732212.png">
<h2>HTML</h2>
<p>Learn the structure of websites</p>
<button class="learn-btn" onclick="goTo('Main/Learner/HTML/Introduction.html')">
Start Learning
</button>
</div>

<!-- CSS -->

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/732/732190.png">
<h2>CSS</h2>
<p>Design beautiful websites</p>
<button class="learn-btn" onclick="goTo('Main/Learner/CSS/Introduction.html')">
Start Learning
</button>
</div>

<!-- JavaScript -->

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968292.png">
<h2>JavaScript</h2>
<p>Add logic and interactivity</p>
<button class="learn-btn" onclick="goTo('Main/Learner/JavaScript/Introduction.html')">
Start Learning
</button>
</div>

</div>

<button class="nav-btn right" onclick="next()">›</button>

</div>

</div>

<script>

let index = 0;
const carousel = document.getElementById("carousel");
const total = document.querySelectorAll(".card").length;

function update() {
carousel.style.transform = `translateX(-${index * 100}%)`;
}

function next() {
index++;
if(index >= total) {
index = 0;
}
update();
}

function prev() {
index--;
if(index < 0) {
index = total - 1;
}
update();
}

function goTo(page) {
window.location.href = page;
}

</script>

</body>
</html>
