<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProCodex</title>

<style>

body {
margin: 0;
font-family: Arial, sans-serif;
background: #0f172a;
color: white;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
}

.container {
width: 100%;
max-width: 350px;
overflow: hidden;
position: relative;
}

.carousel {
display: flex;
transition: transform 0.4s ease-in-out;
}

.card {
min-width: 100%;
box-sizing: border-box;
padding: 20px;
text-align: center;
}

.card img {
width: 120px;
height: 120px;
object-fit: contain;
margin-bottom: 15px;
}

.card button {
margin-top: 10px;
padding: 10px 20px;
border: none;
background: #3b82f6;
color: white;
border-radius: 8px;
cursor: pointer;
}

.nav-btn {
position: absolute;
top: 50%;
transform: translateY(-50%);
background: rgba(0,0,0,0.5);
border: none;
color: white;
font-size: 20px;
padding: 10px;
cursor: pointer;
z-index: 10;
}

.prev {
left: 0;
}

.next {
right: 0;
}

/* Mobile size specifically 350px */
@media (max-width: 350px) {

.container {
max-width: 350px;
}

.card img {
width: 100px;
height: 100px;
}

}

</style>
</head>

<body>

<div class="container">

<button class="nav-btn prev" onclick="prev()">❮</button>
<button class="nav-btn next" onclick="next()">❯</button>

<div class="carousel" id="carousel">

<div class="card">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg" alt="HTML">
<h2>HTML</h2>
<p>Learn HTML Basics</p>
<button onclick="goTo('Main/Learner/HTML/Introduction.html')">Open</button>
</div>

<div class="card">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/css3/css3-original.svg" alt="CSS">
<h2>CSS</h2>
<p>Learn CSS Styling</p>
<button onclick="goTo('Main/Learner/CSS/Introduction.html')">Open</button>
</div>

<div class="card">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg" alt="JavaScript">
<h2>JavaScript</h2>
<p>Learn JS Logic</p>
<button onclick="goTo('Main/Learner/JS/Introduction.html')">Open</button>
</div>

</div>
</div>

<script>

let index = 0;
const carousel = document.getElementById("carousel");
const total = document.querySelectorAll(".card").length;

function update() {
carousel.style.transform = `translateX(-${index * 100}%)`;
}

function next() {
index = (index + 1) % total;
update();
}

function prev() {
index = (index - 1 + total) % total;
update();
}

function goTo(page) {
window.location.href = page;
}

/* Swipe (Fixed - won't block clicks) */

let startX = 0;
let endX = 0;
let isSwiping = false;

carousel.addEventListener("touchstart", (e) => {
startX = e.touches[0].clientX;
isSwiping = false;
});

carousel.addEventListener("touchmove", (e) => {
endX = e.touches[0].clientX;

if(Math.abs(startX - endX) > 10){
isSwiping = true;
}
});

carousel.addEventListener("touchend", () => {

if(!isSwiping) return;

if(startX - endX > 50){
next();
}

if(endX - startX > 50){
prev();
}

});

</script>

</body>
</html>
